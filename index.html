<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping List</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .container {
        width: 400px;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        margin-top: 10px;
        padding: 10px;
        border: none;
        background: #000;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background: #fafafa;
        margin-top: 10px;
        padding: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
      }

      .delete {
        color: red;
        cursor: pointer;
      }

      .clear {
        width: 100%;
        margin-top: 20px;
        background: #ddd;
        color: black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📝 Shopping List</h1>

      <input type="text" id="itemInput" placeholder="Enter Item" />

      <button onclick="addItem()">+ Add Item</button>

      <h3>Filter Items</h3>

      <input type="text" id="filter" placeholder="Search..." />

      <ul id="list">
        <li>Apples <span class="delete" onclick="removeItem(this)">X</span></li>
        <li>
          Orange Juice <span class="delete" onclick="removeItem(this)">X</span>
        </li>
        <li>Oreos <span class="delete" onclick="removeItem(this)">X</span></li>
        <li>Milk <span class="delete" onclick="removeItem(this)">X</span></li>
      </ul>

      <button class="clear" onclick="clearAll()">Clear All</button>
    </div>

    <script>
      function addItem() {
        let input = document.getElementById("itemInput");
        let value = input.value;

        if (value === "") return;

        let li = document.createElement("li");

        li.innerHTML =
          value + ' <span class="delete" onclick="removeItem(this)">X</span>';

        document.getElementById("list").appendChild(li);

        input.value = "";
      }

      function removeItem(element) {
        element.parentElement.remove();
      }

      function clearAll() {
        document.getElementById("list").innerHTML = "";
      }

      document.getElementById("filter").addEventListener("keyup", function () {
        let text = this.value.toLowerCase();
        let items = document.querySelectorAll("#list li");

        items.forEach(function (item) {
          if (item.textContent.toLowerCase().indexOf(text) != -1)
            item.style.display = "flex";
          else item.style.display = "none";
        });
      });
    </script>
  </body>
</html>
